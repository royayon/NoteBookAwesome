name: CI

# Verifies the extension typechecks and builds on every push and PR to main.
# Never publishes — publishing only happens on version tags (see release.yml).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run compile

      - name: Build
        run: npm run build
