name: Release

# Publishes to the VS Code Marketplace and Open VSX whenever a version tag is
# pushed (e.g. v0.2.0). Cut a release locally with `npm run release`, then
# `git push --follow-tags`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 here (not 18): @vscode/vsce -> cheerio -> undici@7 needs the
      # global File API introduced in Node 20. Only the packaging/publishing
      # toolchain requires this; the extension itself still targets VS Code 1.70.
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package -o notebookawesome.vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath notebookawesome.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish notebookawesome.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" notebookawesome.vsix --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
